
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #618764 0%, #4a6b4d 50%, #2d4a2f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .maintenance-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #a8c8a9;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .social-links a:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .social-links a i {
            transition: transform 0.3s ease;
        }

        .social-links a:hover i {
            transform: scale(1.1);
        }

        .tooltip {
            position: absolute;
            bottom: -35px;
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .social-links a:hover .tooltip {
            opacity: 1;
        }

        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.85;
        }

        .alfred {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            color: #c8e6c9;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .alfred:hover {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .love-icon {
            color: #ff6b6b;
            animation: heartbeat 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            
            .social-links {
                gap: 15px;
            }
            
            .social-links a {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="maintenance-icon">
            <i class="fas fa-tools"></i>
        </div>
        
        <h1>Under Maintenance</h1>
        <p class="subtitle">I am currently working on this page. Please check back soon!</p>
        
        <div class="social-links">
            <a href="https://github.com/alfredphiri" target="_blank" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
            
            <a href="https://t.me/alfredphiri" target="_blank" title="Telegram">
                <i class="fab fa-telegram-plane"></i>
            </a>
            
            <a href="https://wa.me/alfredjbphiri" target="_blank" title="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
            
            <a href="mailto:alfredjbphiri@gmail.com" title="Email">
                <i class="fas fa-envelope"></i>
            </a>
            
            <a href="https://linkedin.com/in/alfredbandulo" target="_blank" title="LinkedIn">
                <i class="fab fa-linkedin-in"></i>
            </a>
        </div>
        
        <footer>
            <p>&copy; 2026 made with <i class="fas fa-heart love-icon"></i> by <a href="#" class="alfred">alfred</a></p>
        </footer>
    </div>
</body>
</html>
